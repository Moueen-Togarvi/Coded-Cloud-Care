<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Product - QuickInvoive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",

                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 lg:px-10">
<div class="flex items-center gap-3 text-primary">
<div class="size-8">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">QuickInvoice</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex size-10 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-primary/20">
<img alt="Profile" class="h-full w-full object-cover" data-alt="User profile avatar smiling businessman" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1kOeXJblKxGl9A9YN07L5L5l4czimx1pon40WKWwPpQrixm8ableGDWam7ikep7Ag_B0G9tLZji29nToXJC1bPMV2EODby1cdU9Vg-9mJZMNUCOmjAGr9E4goYV_43GzynWa31p6w0vbMBsIoZ02RhQ3cknDL_N2p-aS2m0DX4PJMHuorzf6T_jmhnwgfBRQ_-Q6Y2IWAok9xhDhnpImrlYtGJPrBfaOrnY7nLCQuXNjH8lM1M3m7WkjQY1oAok_kNvg_UcE76zU"/>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">
<!-- Page Title & Actions -->
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
<div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100">Add Product</h1>
<p class="text-slate-500 dark:text-slate-400 mt-1">Manage your inventory details and pricing.</p>
</div>
<div class="flex gap-3 w-full sm:w-auto">
<button class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-50 transition-colors">
                        Cancel
                    </button>
<button class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl bg-primary text-white font-semibold text-sm hover:bg-primary/90 transition-shadow shadow-lg shadow-primary/20">
                        Save Product
                    </button>
</div>
</div>
<!-- Form Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 lg:p-10">
<form class="space-y-8">
<!-- Basic Information -->
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100 mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">info</span>
                                Basic Information
                            </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="col-span-1 md:col-span-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Product Name</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all" placeholder="e.g. Premium Wireless Headphones" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">SKU</label>
<div class="relative">
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 pr-12 transition-all font-mono" type="text" value="PROD-94821"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-primary/80" type="button">
<span class="material-symbols-outlined text-[20px]">refresh</span>
</button>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Category</label>
<select class="form-select w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all">
<option>Electronics</option>
<option>Hardware</option>
<option>Services</option>
<option>Software Subscription</option>
</select>
</div>
</div>
</div>
<hr class="border-slate-100 dark:border-slate-800"/>
<!-- Pricing & Inventory -->
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100 mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">payments</span>
                                Pricing &amp; Inventory
                            </h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Unit</label>
<select class="form-select w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all">
<option>Piece</option>
<option>Hour</option>
<option>Box</option>
<option>kg</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Price ($)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">$</span>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 pl-8 pr-4 transition-all" placeholder="0.00" type="number"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Tax %</label>
<select class="form-select w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all">
<option>None (0%)</option>
<option>GST (5%)</option>
<option>VAT (12%)</option>
<option>Standard (18%)</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Discount % <span class="text-slate-400 font-normal">(Optional)</span></label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all" placeholder="0" type="number"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Stock Quantity</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 transition-all" placeholder="0" type="number"/>
</div>
<div class="flex items-end">
<label class="flex items-center gap-3 cursor-pointer h-12">
<div class="relative inline-block w-11 h-6 transition duration-200 ease-in-out bg-slate-200 dark:bg-slate-700 rounded-full">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-5 h-5 transition duration-200 ease-in-out bg-white rounded-full absolute left-0.5 top-0.5 peer-checked:translate-x-full peer-checked:bg-primary"></div>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Track Inventory</span>
</label>
</div>
</div>
</div>
<hr class="border-slate-100 dark:border-slate-800"/>
<!-- Description -->
<div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100 mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">description</span>
                                Additional Details
                            </h3>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Description</label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary p-4 transition-all resize-none" placeholder="Enter detailed product description, specifications, or internal notes..." rows="4"></textarea>
</div>
</div>
<!-- Form Footer -->

</form>
</div>
</div>
<!-- Supporting Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
<div class="size-12 rounded-full bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-600">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Recent Sales</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">128 Units</p>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
<div class="size-12 rounded-full bg-green-50 dark:bg-green-900/20 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Revenue (MTD)</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">$4,250.00</p>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
<div class="size-12 rounded-full bg-amber-50 dark:bg-amber-900/20 flex items-center justify-center text-amber-600">
<span class="material-symbols-outlined">inventory_2</span>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Stock Status</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">In Stock</p>
</div>
</div>
</div>
</main>

</div>
</body></html>
