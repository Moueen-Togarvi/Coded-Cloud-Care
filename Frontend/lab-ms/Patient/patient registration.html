 <!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LabPro - Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
 document.addEventListener("DOMContentLoaded", function () {
  const bars = document.querySelectorAll('.w-full.h-2\\.5 > div');

  bars.forEach((bar, index) => {
    const percent = parseFloat(bar.style.width) / 100;

    // delay for smooth stagger
    setTimeout(() => {
      bar.style.transform = `scaleX(${percent})`;
    }, 300 + (index * 300));
  });
});
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
  /* ========================= */
/* NAVBAR FIX - NO HTML EDIT */
/* ========================= */

header {
  height: 64px !important;          /* Fix height */
  padding-top: 30px !important;
  padding-bottom: 30px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  flex-wrap: nowrap !important;     /* Prevent line break */
}

/* Remove unwanted vertical gap */
header > div {
  margin-top: 0 !important;
  margin-bottom: 0 !important;
}

/* Force all header children in one line */
header > div {
  display: flex;
  align-items: center;
}

/* Right side icons spacing fix */
header button {
  margin: 0 !important;
}

/* Prevent wrapping on small screens */
@media (max-width: 768px) {
  header {
    flex-direction: row !important;
  }

  header > div {
    flex-direction: row !important;
  }
}
html, body {
  overflow-x: hidden;
}

* {
  box-sizing: border-box;
}

.progress-animate {
  width: 0 !important;
  transition: width 1.5s ease-in-out;
}
/* Smooth Professional Progress Animation */
.w-full.h-2\.5 > div {
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================= */
/* TABLE RESPONSIVE */
/* ============================= */

table {
  min-width: 600px;
}

.overflow-x-auto {
  -webkit-overflow-scrolling: touch;
}

/* ============================= */
/* TABLET (1024px and below) */
/* ============================= */

@media (max-width: 1024px) {

  header {
    flex-wrap: wrap;
    height: auto !important;
    padding-top: 16px;
    padding-bottom: 16px;
    gap: 15px;
  }

  header > div:nth-child(2) {
    order: 3;
    width: 100%;
    max-width: 100% !important;
    margin: 0 !important;
  }

  header > div:nth-child(3) {
    order: 2;
    width: auto;
  }

  .grid-cols-4 {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  .lg\:grid-cols-3 {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  .lg\:col-span-2 {
    grid-column: span 2 / span 2 !important;
  }
}

/* ============================= */
/* MOBILE (768px and below) */
/* ============================= */

@media (max-width: 768px) {

  main {
    width: 100%;
  }

  .grid-cols-4,
  .grid-cols-2,
  .lg\:grid-cols-3 {
    grid-template-columns: 1fr !important;
  }

  .lg\:col-span-2 {
    grid-column: span 1 / span 1 !important;
  }

  .p-8 {
    padding: 16px !important;
  }

  header {
    flex-direction: column;
    align-items: flex-start !important;
  }

  header > div {
    width: 100%;
  }

  header > div:nth-child(3) {
    display: flex;
    justify-content: space-between;
    width: 100%;
  }

  header input {
    width: 100%;
  }

  table {
    font-size: 13px;
  }

}

/* ============================= */
/* SMALL MOBILE (480px and below) */
/* ============================= */

@media (max-width: 480px) {

  h1 {
    font-size: 18px !important;
  }

  h3 {
    font-size: 22px !important;
  }

  .text-3xl {
    font-size: 20px !important;
  }

  .p-6 {
    padding: 14px !important;
  }

  .p-8 {
    padding: 14px !important;
  }

}
@media (max-width: 768px) {
  header > div:nth-child(2) {
    display: none !important;
  }
}
    </style>
    
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex overflow-hidden">
<!-- Sidebar -->
<!-- Main Content -->
<main class="flex-1 flex flex-col">
<!-- Top Navbar -->
<header class="h-20 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark flex items-center justify-between px-8 sticky top-0 z-50">
<div class="flex items-center gap-8">
<div class="flex items-center gap-3">
<div class="bg-primary p-1.5 rounded-lg">
<span class="material-symbols-outlined text-white">biotech</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">LabPro</h1>
</div>
</div>
<div class="flex-1 max-w-md mx-8">
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full bg-slate-100 dark:bg-slate-800/50 border-none rounded-xl py-2 pl-10 pr-4 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="Search patients, tests, or invoices..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="relative p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full border-2 border-white dark:border-background-dark"></span>
</button>

</div>
</header>
 <div class="flex-1 overflow-y-auto px-6 py-8 lg:px-12 bg-background-light dark:bg-background-dark">
<div class="max-w-4xl mx-auto">
<nav class="flex items-center gap-2 text-sm text-slate-500 mb-6">
<a class="hover:text-primary transition-colors" href="/lab-ms/Patient/Patient.html">Patients</a>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span class="text-slate-900 dark:text-white font-medium">New Registration</span>
</nav>
<div class="mb-8">
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Patient Registration</h1>
<p class="text-slate-500 dark:text-slate-400 mt-1">Provide comprehensive medical and contact information to create a unique profile.</p>
</div>
<form class="space-y-6">
<!-- Personal Information Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 lg:p-8">
<div class="flex items-center gap-2 mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">
<span class="material-symbols-outlined text-primary">person</span>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Personal Information</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Full Name</label>
<input class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white" placeholder="Hashim" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Date of Birth</label>
<input class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white" type="date"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Gender</label>
<select class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white">
<option value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Blood Group</label>
<input class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white" placeholder="O Positive" type="text"/>
</div>
</div>
</div>
<!-- Address Information Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 lg:p-8">
<div class="flex items-center gap-2 mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">
<span class="material-symbols-outlined text-primary">location_on</span>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Address Details</h3>
</div>
<div class="grid grid-cols-1 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Residential Address</label>
<textarea class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white resize-none" placeholder="Street address, City, State, Zip Code" rows="3"></textarea>
</div>
</div>
</div>
<!-- Medical Context Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 lg:p-8">
<div class="flex items-center gap-2 mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">
<span class="material-symbols-outlined text-primary">medical_services</span>
<h3 class="text-lg font-bold text-slate-900 dark:text-white">Referring Doctor</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Doctor Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 text-[20px]">search</span>
<input class="w-full pl-10 rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white" placeholder="Search for doctor..." type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Department</label>
<input class="rounded-xl border-slate-200 dark:border-slate-800 dark:bg-slate-800 focus:border-primary focus:ring-primary text-slate-900 dark:text-white" placeholder="Cardiology, General, etc." type="text"/>
</div>
</div>
</div>
<!-- Form Actions -->
<div class="flex flex-col sm:flex-row items-center justify-end gap-4 pt-4 pb-12">
<button class="w-full sm:w-auto px-8 py-3 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" type="button">
                                    Cancel
                                </button>
<button class="w-full sm:w-auto px-10 py-3 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">save</span>
                                    Register Patient
                                </button>
</div>
</form>
</div>
</div>
</main>
</body></html>
