<!-- Image Placeholder from Reference -->
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">Select Role</label>
<div class="relative group">
<select class="w-full h-12 pl-4 pr-10 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium
             focus:outline-none focus:ring-2 focus:ring-[#D94D0B]/30 focus:border-[#D94D0B] 
             hover:border-[#D94D0B] transition-all appearance-none cursor-pointer">
<option disabled selected>Select your role</option>
<option>Admin</option>
<option>Lab Manager</option>
<option>Lab Technician</option>
<option>Doctor</option>
<option>Patient</option>
<option>Receptionist</option>

</select>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">Username or Email</label>
<div class="relative group">
<input class="w-full h-12 pl-4 pr-10 bg-slate-50 border-slate-200 border rounded-xl text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-[#ec5b13]/20 focus:border-[#ec5b13] transition-all" placeholder="Enter your username or email" type="text"/>

</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
<div class="relative group">
<input class="w-full h-12 pl-4 pr-10 bg-slate-50 border-slate-200 border rounded-xl text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-[#ec5b13]/20 focus:border-[#ec5b13] transition-all" placeholder="Enter your password" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-slate-600">visibility</span>
</div>
</div>
<div class="flex items-center justify-between pt-2 px-1">
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-slate-300 text-[#ec5b13] focus:ring-[#ec5b13] transition-colors cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm text-slate-500 cursor-pointer select-none" for="remember">Keep me logged in</label>
</div>
<a class="text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="space-y-3 pt-4">
<button class="w-full h-12 bg-[#ec5b13] hover:bg-[#d94d0b] text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group active:scale-[0.98] shadow-blue-100" type="submit">
                    Login
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">login</span>
</button>
<button class="w-full h-12 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold rounded-xl transition-all flex items-center justify-center gap-2 active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
<path d="M1 1h22v22H1z" fill="none"></path>
</svg>
                    Sign in with Google
                </button>
</div>
</form>
<div class="pt-4 text-center border-t border-slate-100">
<p class="text-sm text-slate-500">New to LabPro? <a class="font-bold text-primary hover:underline" href="/lab-ms/signup.html">Create an Account</a></p>
</div>

</div>
